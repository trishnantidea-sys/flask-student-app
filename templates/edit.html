<h1>Edit Student Data</h1>

<form method="POST" action="{{ url_for('update_student', id=student.id) }}">
    Name :
    <input type="text" name="Nama" value="{{student.name}}">

    <input type="number" name="Usia" value="{{student.age}}">

</form>
<a href="{{url_for('index')}}">Back</a>
